services:
  - type: web
    name: cynapse-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    rootDir: backend
    envVars:
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./cynapse.db
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: SETTINGS_ENCRYPTION_KEY
        generateValue: true
